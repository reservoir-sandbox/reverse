name: CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: reverse
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  TASK_TYPE: static

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops-deployment
          token: ${{ secrets.PAT_TOKEN }}
          path: gitops-deployment

      - name: Update worker image tag in job-to-run chart
        run: |
          VALUES_PATH="gitops-deployment/charts/job-to-run/values.yaml"
          NEW_IMAGE_TAG="${{ steps.meta.outputs.version }}"

          if [ -f "$VALUES_PATH" ]; then
            yq eval -i ".workers.${TASK_TYPE}.tag = \"$NEW_IMAGE_TAG\"" "$VALUES_PATH"
            echo "✅ Updated workers.${TASK_TYPE}.tag to $NEW_IMAGE_TAG in $VALUES_PATH"
          else
            echo "❌ Error: GitOps chart values not found at $VALUES_PATH"
            exit 1
          fi

      - name: Push updated chart values to GitOps repo
        run: |
          git -C gitops-deployment config --global user.name "github-actions[bot]"
          git -C gitops-deployment config --global user.email "github-actions[bot]@users.noreply.github.com"

          git -C gitops-deployment add charts/job-to-run/values.yaml
          if [ -n "$(git -C gitops-deployment status --porcelain)" ]; then
            git -C gitops-deployment commit -m "chore(${TASK_TYPE}): auto-update ${IMAGE_NAME} image tag to ${{ steps.meta.outputs.version }}"
            git -C gitops-deployment push
          else
            echo "Chart values already synchronized. Skipping git operations."
          fi
